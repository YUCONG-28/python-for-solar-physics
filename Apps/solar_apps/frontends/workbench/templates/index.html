<!doctype html>
<html lang="en" data-frontend-id="workbench" data-interface-id="workbench">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solar Physics Workbench</title>
    <link rel="stylesheet" href="/assets/solar-theme.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Solar Physics Workbench</h1>
        <p>Local workflow console for AIA, HMI, radio, LASCO, DEM, and media tools.</p>
      </div>
      <div class="topbar-actions">
        <div class="solar-ui-controls">
          <label>Theme<select data-theme-selector><option value="auto">Auto</option><option value="light">Light</option><option value="dark">Dark</option></select></label>
          <button type="button" data-reset-ui-state>Reset UI State</button>
        </div>
        <a class="workspace-link" href="/radio">Open Radio Workspace</a>
        <div class="status-pill" id="healthStatus">Checking</div>
      </div>
    </header>

    <main class="app-shell">
      <aside class="sidebar">
        <label class="search-label" for="moduleSearch">Workflow Library</label>
        <input id="moduleSearch" type="search" placeholder="Search workflows" />
        <nav id="categoryNav" class="category-nav" aria-label="Workflow categories"></nav>
      </aside>

      <section class="module-panel">
        <div class="panel-toolbar">
          <div>
            <h2 id="categoryTitle">Workflow Library</h2>
            <p id="categorySummary">Select a workflow to configure and run it locally.</p>
          </div>
          <button id="refreshModulesBtn" type="button">Refresh</button>
        </div>
        <div id="moduleGrid" class="module-grid" aria-live="polite"></div>
        <section class="legacy-band">
          <div class="legacy-heading">
            <h2>Legacy Reference</h2>
            <span>Advanced</span>
          </div>
          <div id="legacyList" class="legacy-list"></div>
        </section>
      </section>

      <section class="detail-panel" aria-live="polite">
        <div id="moduleDetail" class="module-detail empty-state">
          <h2>Select Workflow</h2>
          <p>Choose a workflow from the library.</p>
        </div>
        <form id="jobForm" class="job-form" hidden>
          <label for="argumentsInput">CLI arguments</label>
          <textarea id="argumentsInput" rows="5" placeholder="--help"></textarea>
          <label for="pathsInput">Local paths</label>
          <textarea id="pathsInput" rows="4" placeholder="One path per line"></textarea>
          <div class="button-row">
            <button id="addFilesBtn" type="button">Add File(s)</button>
            <button id="addFolderBtn" type="button">Add Folder</button>
            <span id="pathBrowseStatus" aria-live="polite"></span>
          </div>
          <div class="button-row">
            <button id="runJobBtn" type="submit">Run Workflow</button>
            <button id="cancelJobBtn" type="button" disabled>Cancel Job</button>
          </div>
        </form>
        <section class="job-panel">
          <div class="job-header">
            <h2>Job Log</h2>
            <span id="jobStatus" class="job-status">Idle</span>
          </div>
          <pre id="jobLog" class="job-log"></pre>
        </section>
      </section>
    </main>

    <script src="/assets/solar-theme.js"></script>
    <script src="/assets/solar-theme-state.js"></script>
    <script src="/api/native-path-dialog/client.js"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
    <script>SolarTheme.init("workbench"); SolarUiState.init("workbench");</script>
  </body>
</html>
