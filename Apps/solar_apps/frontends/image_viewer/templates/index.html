<!doctype html>
<html lang="en" data-frontend-id="image-viewer" data-interface-id="image-viewer">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Image Sequence Web Viewer</title>
  <link rel="stylesheet" href="/assets/solar-theme.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body data-default-output-format="{{ default_output_format }}">
  <div id="appShell" class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div>
          <h1>Image Viewer</h1>
          <p>Local sequences, synchronized review, recording export.</p>
        </div>
        <button id="sidebarToggleBtn" class="icon-button" type="button" title="Collapse sidebar">&laquo;</button>
      </div>

      <section class="tool-section">
        <h2>Folders</h2>
        <label for="folderInput">Image folders, one per line</label>
        <textarea id="folderInput" rows="6" spellcheck="false" placeholder="One allowed image folder per line"></textarea>
        <div class="sidebar-row">
          <button id="browseFolderBtn" type="button">Browse folder</button>
          <label class="checkbox">
            <input id="recursiveInput" type="checkbox" /> Recursive
          </label>
          <button id="loadBtn" class="primary" type="button">Load</button>
        </div>
        <span id="loadStatus" class="status"></span>
      </section>

      <section class="tool-section common-controls">
        <h2>Playback</h2>
        <div class="button-row">
          <button id="prevBtn" type="button" disabled title="Previous frame">&lt;</button>
          <button id="playBtn" type="button" disabled>Play</button>
          <button id="nextBtn" type="button" disabled title="Next frame">&gt;</button>
        </div>
        <label for="fpsInput">FPS</label>
        <input id="fpsInput" type="number" min="0.2" max="60" step="0.2" value="5" />
        <label for="preloadFrameInput">Preload frames</label>
        <input id="preloadFrameInput" type="number" min="0" step="1" value="30" />
        <label for="frameSlider">Frame</label>
        <input id="frameSlider" type="range" min="0" max="0" value="0" disabled />
        <div class="sidebar-row">
          <span id="frameText" class="frame-readout">0 / 0</span>
          <label class="checkbox">
            <input id="loopInput" type="checkbox" checked /> Loop
          </label>
        </div>
      </section>

      <section class="tool-section common-controls">
        <h2>Layout</h2>
        <div class="button-row segmented">
          <button id="fitLayoutBtn" type="button" class="active" data-layout-mode="fit">Fit Screen</button>
          <button id="landscapeLayoutBtn" type="button" data-layout-mode="landscape">Landscape</button>
          <button id="portraitLayoutBtn" type="button" data-layout-mode="portrait">Portrait</button>
        </div>
        <label class="checkbox">
          <input id="syncViewInput" type="checkbox" checked /> Sync view
        </label>
        <label class="checkbox">
          <input id="syncRoiInput" type="checkbox" checked /> Sync ROI
        </label>
        <div class="button-row">
          <button id="roiBtn" type="button" disabled>ROI</button>
          <button id="clearRoiBtn" type="button" disabled>Clear ROI</button>
          <button id="resetViewBtn" type="button" disabled>Reset View</button>
        </div>
      </section>

      <details id="settingsPanel" class="tool-section settings-panel">
        <summary>Settings</summary>

        <div class="settings-group">
          <h2>Appearance</h2>
          <label for="themeInput">Theme</label>
          <select id="themeInput" data-theme-selector>
            <option value="auto">Auto</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>

        <div class="settings-group">
          <h2>Memory</h2>
          <div class="button-row">
            <button id="saveSettingsBtn" type="button">Save current settings</button>
            <button id="clearSettingsBtn" type="button" data-reset-ui-state>Reset UI State</button>
          </div>
          <span id="settingsStatus" class="status"></span>
        </div>

        <div class="settings-group">
          <h2>Service</h2>
          <label class="checkbox">
            <input id="stopOnCloseInput" type="checkbox" checked /> Stop service when this page closes
          </label>
        </div>

        <div id="exportSettingsGroup" class="settings-group">
          <h2>Recording & Export</h2>
          <label for="formatInput">Format</label>
          <select id="formatInput">
            <option value="mp4">MP4</option>
            <option value="gif">GIF</option>
            <option value="webm">WebM</option>
          </select>
          <label for="exportModeInput">Mode</label>
          <select id="exportModeInput">
            <option value="composite">Composite</option>
            <option value="separate">Separate</option>
            <option value="both">Both</option>
          </select>
          <label for="outputDirInput">Output dir</label>
          <div class="sidebar-row">
            <input id="outputDirInput" type="text" value="outputs/image_web_viewer" />
            <button id="browseOutputDirBtn" type="button">Browse</button>
          </div>
          <label for="prefixInput">Prefix</label>
          <input id="prefixInput" type="text" value="image_viewer" />
          <div class="two-col">
            <label>Start
              <input id="startFrameInput" type="number" min="1" value="1" />
            </label>
            <label>End
              <input id="endFrameInput" type="number" min="1" placeholder="last" />
            </label>
          </div>
          <div class="two-col">
            <label>Width
              <input id="targetWidthInput" type="number" min="2" placeholder="auto" />
            </label>
            <label>Height
              <input id="targetHeightInput" type="number" min="2" placeholder="auto" />
            </label>
          </div>
          <div class="sidebar-row">
            <label class="checkbox">
              <input id="exportRoiInput" type="checkbox" /> Export ROI
            </label>
            <label class="quality-label">Quality
              <select id="qualityInput">
                <option value="low">low</option>
                <option value="high">high</option>
              </select>
            </label>
          </div>
          <div class="sidebar-row">
            <button id="exportBtn" type="button" disabled>Export</button>
            <span id="exportStatus" class="status"></span>
          </div>
          <div class="sidebar-row recording-status-row">
            <button id="recordBtn" type="button" disabled>Start Recording</button>
            <span class="recording-status">
              <span id="recordStatus" class="status"></span>
              <span id="recordingStatusDetail" class="status-detail"></span>
            </span>
          </div>
        </div>
      </details>
    </aside>

    <main class="viewer-workbench">
      <div class="stage-toolbar">
        <button id="mobileSidebarBtn" class="icon-button" type="button" title="Open sidebar">Menu</button>
        <div>
          <strong>Viewer Stage</strong>
          <span id="stageStatus">Load one or more folders to start.</span>
        </div>
      </div>
      <section id="viewerGrid" class="viewer-grid" data-layout="fit" data-count="0"></section>
    </main>
  </div>

  <script src="/assets/solar-theme.js"></script>
  <script src="/assets/solar-theme-state.js"></script>
  <script src="/media-assets/mediabunny-1.50.8.cjs"></script>
  <script src="/media-assets/browser_media.js"></script>
  <script src="/api/native-path-dialog/client.js"></script>
  <script src="/static/main.js"></script>
  <script>
    SolarTheme.init("image-viewer", {legacyThemeKeys: ["solarToolkit.imageViewer.v1.theme"]});
    SolarUiState.init("image-viewer", {
      legacyThemeKeys: ["solarToolkit.imageViewer.v1.theme"],
      legacyMappings: [
        {
          key: "solarToolkit.imageViewer.v1.settings",
          maxBytes: 32768,
          fields: {
            recursive: "image-viewer.recursiveInput",
            fps: "image-viewer.fpsInput",
            preloadFrameCount: "image-viewer.preloadFrameInput",
            loop: "image-viewer.loopInput",
            layoutMode: "image-viewer.layoutMode",
            syncView: "image-viewer.syncViewInput",
            syncRoi: "image-viewer.syncRoiInput",
            outputDir: "image-viewer.outputDirInput",
            prefix: "image-viewer.prefixInput",
            quality: "image-viewer.qualityInput",
            exportMode: "image-viewer.exportModeInput",
            outputFormat: "image-viewer.formatInput",
            stopOnClose: "image-viewer.stopOnCloseInput",
            theme: "image-viewer.themeInput"
          }
        },
        {key: "solarToolkit.imageViewer.v1.folders", field: "image-viewer.folderInput", parseJson: true, maxBytes: 32768}
      ]
    });
  </script>
</body>
</html>
