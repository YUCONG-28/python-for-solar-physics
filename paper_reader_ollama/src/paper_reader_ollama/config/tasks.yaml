提取摘要任务:
  description: >
    请阅读以下论文内容：
    {paper_content}

    你的任务是提取该论文的以下关键信息，并用中文简要回答：
    1. 研究问题与动机（1-2句话）
    2. 提出的方法/模型名称及其核心思想（2-3句话）
    3. 论文宣称的主要贡献与结论（列出2-3点）
  expected_output: >
    一个包含"研究问题"、"方法与核心思想"、"主要贡献与结论"三部分的清晰摘要。
  agent: 摘要提取员

批判分析任务:
  description: >
    基于以下摘要内容，对论文进行深度批判性分析：

    摘要内容：
    {提取摘要任务.output}

    请从以下几个方面进行审视，每个方面给出1-2个具体的点评：
    1. 问题定义与动机：是否清晰且重要？是否有为了方法而造问题的嫌疑？
    2. 方法合理性：技术路线是否自洽？与现有工作对比的亮点和可能缺陷是什么？
    3. 实验验证：实验设计是否能充分支撑结论？对比基线是否合理？结果是否显著？
    4. 潜在问题：论文中有哪些未提及的假设或限制？
  expected_output: >
    一份分点列出批判性意见的列表，每条意见需有明确指向性。
  agent: 批判分析员
  context: [提取摘要任务]

撰写报告任务:
  description: >
    现在需要你整合以下两份材料，撰写最终的分析报告：

    【论文摘要】：
    {提取摘要任务.output}

    【批判性意见】：
    {批判分析任务.output}

    请严格按照以下结构撰写报告（用中文）：
    ## 1. 论文概览
    （简述论文要解决什么问题，核心贡献是什么）
    ## 2. 方法解读
    （解释论文提出的方法/模型，突出其创新点）
    ## 3. 实验与批判
    （总结实验发现，并融入批判性分析中指出的问题）
    ## 4. 局限性与展望
    （指出论文的局限性，并提出未来可能改进方向）
    ## 5. 综合评价
    （给出一个简短的结论性评价，例如：是否值得精读、适用场景等）
  expected_output: >
    一份完整、专业的中文分析报告（Markdown格式）。
  agent: 报告撰写员
  context: [提取摘要任务, 批判分析任务]
  output_file: 论文分析报告.md