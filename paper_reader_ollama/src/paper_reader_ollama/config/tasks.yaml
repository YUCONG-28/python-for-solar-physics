理论拆解任务:
  description: >
    请以研究生“精读细读”的视角，对以下论文内容进行深度解析：
    {paper_content}

    你的核心目标是详细介绍论文的主要内容，并完成以下拆解：
    1. 【核心内容与贡献介绍】：详细且系统地阐述论文的研究背景、解决的核心痛点、提出的创新方法以及得出的最终结论。
    2. 【技术路线深剖】：一步步拆解其方法论、模型架构、推导过程或实验设计。

    ⚠️【必须遵守的严格规范】：
    - **专业名词保留英文**：所有学术界专业术语、缩写或专有名词，必须采用中英双语格式，保留英文原词（例如：“磁重联（Magnetic Reconnection）”、“自注意力机制（Self-Attention Mechanism）”）。
    - **原文精准对照**：每一个技术步骤或核心观点的中文解读之后，必须另起一行，用引用块（>）紧跟对应的 **英文原文引用**，做到论点必有出处。
    - **图文精准匹配**：留意文本中的 `[本地图片路径: ...]` 标记。当解读到对应的实验结果、架构图或图表时，必须在对应的段落下方，以 Markdown 格式插入该图片：`![原文配图说明](路径)`。
    - **数学公式完美显示**：所有公式必须使用标准 LaTeX 格式！行内公式严格使用 $公式$ 包裹（注意：$符号与公式之间严禁有空格），独立成行的块级公式严格使用 $$公式$$ 包裹。不要将公式放到代码块中，不要错误转义下划线（_）。
  expected_output: >
    一份“核心内容精讲 + 专业术语双语 + 中英文原句对照 + 图文公式完美排版”的深度研读技术笔记。
  agent: 理论拆解员

复现审查任务:
  description: >
    基于《理论拆解任务》的输出，从“复现者”的视角进行严苛审查：
    1. 【实验细节补全】：检查论文是否交待了关键超参数、数据预处理流程或特殊设置，补充遗漏的专业术语（保留英文）。
    2. 【逻辑与公式校验】：对比作者的解释说明与对应的原文引用，检查是否存在过度推断。仔细校验公式部分的逻辑是否连贯，变量解释是否完整。
  expected_output: >
    一份针对复现难点、逻辑漏洞及补充信息的审查报告。
  agent: 复现审查员
  context: [理论拆解任务]

撰写导师报告任务:
  description: >
    整合上述所有的拆解与审查成果，为课题组撰写最终的《深度精读研读报告》。

    报告必须严格按照以下结构组织：
    # 📜 深度研读与启发报告

    ## 1. 论文核心内容导读 (Executive Summary)
    （全面概括论文解决的关键问题、核心创新点和主要结论。专业名词请务必保留英文，例如：大模型 Large Language Model）

    ## 2. 章节对照精读 (Section-by-Section Mapping)
    （展示“理论拆解员”的详细解读。必须确保：中文精读剖析在前，对应的原汁原味英文原文引用在后。精准关联对应的图片 `![图例](路径)` 和 LaTeX 公式）

    ## 3. 技术细节深潜 (Methodological Deep Dive)
    （重点展示核心公式的推导解释和模型图解的文字描述。确保 $和$$ 公式排版正确）

    ## 4. 复现风险预警 (Reproducibility & Gaps)
    （基于审查员的报告，列出复现可能遇到的技术难点）

    ## 5. 导师建议与研究启发 (Future Directions)
    （给出针对该论文后续改进的 2-3 个具体且有深度的 Idea）

    ⚠️ 【终极排版要求】：绝对保留所有 Markdown 图片插入语法、引用块格式（>）以及正确的 LaTeX 公式语法（$ 和 $$），不得丢失。
  expected_output: >
    一份结构严谨、带大量原图、中英对照、公式精准、专业术语保留英文的学术级精读报告。
  agent: Idea启发导师
  context: [理论拆解任务, 复现审查任务]
