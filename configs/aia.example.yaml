# Example AIA workflow configuration.
# Copy values into configs/paths.local.yaml or a future local config file.
# Do not commit real observation paths.

aia:
  data_root: D:/path/to/aia_data
  output_dir: D:/path/to/output/aia

  selected_wavelengths:
    - 94
    - 131
    - 171
    - 193
    - 211
    - 304

  mode: mosaic
  difference_mode: running
  base_time: null
  running_difference: true

  display:
    colormap:
      94: sdoaia94
      131: sdoaia131
      171: sdoaia171
      193: sdoaia193
      211: sdoaia211
      304: sdoaia304
    vmin:
      171: 16
      193: 49
    vmax:
      171: 2800
      193: 4200
    percentile: 99.5

  output:
    save_png: true
    output_dir: D:/path/to/output/aia
