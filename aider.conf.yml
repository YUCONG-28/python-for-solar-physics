# Aider 核心配置
openai-api-base: https://api.deepseek.com
model: deepseek/deepseek-reasoner
auto-commits: true
show-diffs: true
dark-mode: true

# --- 推荐增加的高级功能 ---

# 项目索引：帮助 AI 理解大型项目的代码拓扑结构
map-tokens: 1024

# 交互增强：允许 AI 建议 shell 命令
suggest-shell-commands: true

# 语言设置：固定为中文交互
chat-language: zh

# 成本优化：启用 DeepSeek 的提示词缓存功能
cache-prompts: true

# 自动链接：如果安装了 playwright，允许 Aider 读取网页内容
browser: true

# --- 新增：引用模型设置文件 ---
model-settings-file: .aider.model.settings.yml