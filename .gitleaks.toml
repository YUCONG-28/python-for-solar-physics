[extend]
useDefault = true

[[allowlists]]
description = "Conda package metadata mistaken for a generic API key"
targetRules = ["generic-api-key"]
condition = "AND"
paths = ['''^environment\.yml$''']
regexTarget = "line"
regexes = ['''^[[:space:]]*-[[:space:]]*_libavif_api=[0-9][0-9A-Za-z._+=-]*[[:space:]]*$''']
