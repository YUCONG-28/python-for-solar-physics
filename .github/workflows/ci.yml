name: Public CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-history-scan:
    name: Gitleaks (complete history)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out complete repository history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="8.30.0"
          archive="gitleaks_${version}_linux_x64.tar.gz"
          curl --fail --location --silent --show-error \
            --output "${RUNNER_TEMP}/${archive}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}"
          echo "79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e  ${RUNNER_TEMP}/${archive}" \
            | sha256sum --check --strict
          tar --extract --gzip \
            --file "${RUNNER_TEMP}/${archive}" \
            --directory "${RUNNER_TEMP}" \
            gitleaks
          chmod 0755 "${RUNNER_TEMP}/gitleaks"

      - name: Scan complete Git history for secrets
        shell: bash
        run: |
          set -euo pipefail
          "${RUNNER_TEMP}/gitleaks" git \
            --config .gitleaks.toml \
            --redact \
            --log-opts="--full-history --all --diff-filter=tuxdb" \
            .

  python-public-package:
    name: Python public package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Python
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: Python/pyproject.toml

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install ruff

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Compile public Python sources
        run: python -m compileall -q solar_toolkit tests examples/public_api

      - name: Run Ruff
        run: python -m ruff check solar_toolkit tests examples/public_api

      - name: Run public Python tests
        run: python -m pytest tests

      - name: Build wheel
        run: python -m build --wheel --outdir dist

      - name: Validate wheel boundary
        shell: bash
        run: |
          python - <<'PY'
          from configparser import ConfigParser
          from glob import glob
          from io import StringIO
          from zipfile import ZipFile

          wheels = sorted(glob("dist/*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected one wheel, found {wheels}")

          blocked_prefixes = (
              "solar_toolkit/webapp/",
              "solar_toolkit/visualization/image_web_viewer/",
              "solar_toolkit/visualization/_media_assets/",
              "solar_toolkit/visualization/media_assets/",
              "solar_toolkit/radio/configs/",
              "scripts/",
              "legacy/",
              "Local/",
          )
          blocked_suffixes = (".html", ".css", ".js")

          with ZipFile(wheels[0]) as archive:
              names = archive.namelist()
              forbidden = [
                  name
                  for name in names
                  if name.startswith(blocked_prefixes)
                  or (
                      name.startswith("solar_toolkit/")
                      and name.lower().endswith(blocked_suffixes)
                  )
              ]
              if forbidden:
                  raise SystemExit(f"local application content in wheel: {forbidden}")

              entry_points = [
                  name for name in names if name.endswith(".dist-info/entry_points.txt")
              ]
              for entry_point in entry_points:
                  parser = ConfigParser()
                  parser.read_file(
                      StringIO(archive.read(entry_point).decode("utf-8"))
                  )
                  if parser.has_section("console_scripts"):
                      raise SystemExit(
                          f"public console scripts remain: {dict(parser['console_scripts'])}"
                      )

          print(f"wheel boundary ok: {wheels[0]}")
          PY

          wheel_env="${RUNNER_TEMP}/solarphysics-wheel-smoke"
          python -m venv --system-site-packages "$wheel_env"
          "$wheel_env/bin/python" -m pip install --force-reinstall --no-deps dist/*.whl
          (
            cd "${RUNNER_TEMP}"
            "$wheel_env/bin/python" -I -c \
              "from pathlib import Path; import sys; import solar_toolkit; import solar_toolkit.radio; assert Path(solar_toolkit.__file__).is_relative_to(Path(sys.prefix)); print(solar_toolkit.__version__)"
          )

  apps-miniforge:
    name: Apps (Windows Miniforge)
    runs-on: windows-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    defaults:
      run:
        shell: powershell
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Create Miniforge application environment
        uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v4.0.1
        with:
          activate-environment: solarphysics_env_latest
          environment-file: Apps/environment.miniforge.yml
          python-version: "3.14"
          miniforge-version: latest
          channels: conda-forge
          channel-priority: strict
          conda-remove-defaults: "true"
          auto-update-conda: false

      - name: Install public library and applications
        run: |
          conda run --no-capture-output -n solarphysics_env_latest `
            python -m pip install --upgrade pip
          conda run --no-capture-output -n solarphysics_env_latest `
            python -m pip install -e ".\Python[quality-ml]"
          conda run --no-capture-output -n solarphysics_env_latest `
            python -m pip install -e ".\Apps[dev]"
          conda run --no-capture-output -n solarphysics_env_latest `
            python -m pip check

      - name: Initialize private CI runtime
        run: |
          $env:SOLAR_MINIFORGE_ROOT = $env:CONDA
          conda run --no-capture-output -n solarphysics_env_latest `
            powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\Apps\run.ps1 admin init

      - name: Compile Apps sources and tests
        run: |
          conda run --no-capture-output -n solarphysics_env_latest `
            python -m compileall -q Apps\solar_apps Apps\tests

      - name: Run Apps Ruff checks
        run: |
          conda run --no-capture-output -n solarphysics_env_latest `
            python -m ruff check Apps\solar_apps Apps\tests

      - name: Check Apps formatting
        run: |
          conda run --no-capture-output -n solarphysics_env_latest `
            python -m black --check Apps\solar_apps Apps\tests

      - name: Run Apps tests and repository contracts
        run: |
          conda run --no-capture-output -n solarphysics_env_latest `
            python -m pytest Apps\tests --basetemp Local\tmp\pytest-apps-ci

      - name: Smoke canonical frontend help
        run: |
          $env:SOLAR_MINIFORGE_ROOT = $env:CONDA
          $frontends = @(
            "workbench",
            "image-viewer",
            "image-composer",
            "bad-frame-review",
            "source-map",
            "dart-spectrogram",
            "roi-lightcurve",
            "radio-composite",
            "source-trajectory"
          )
          foreach ($frontend in $frontends) {
            conda run --no-capture-output -n solarphysics_env_latest `
              powershell.exe -NoProfile -ExecutionPolicy Bypass `
              -File .\Apps\run.ps1 frontend $frontend --help
            if ($LASTEXITCODE -ne 0) {
              throw "Frontend help failed: $frontend"
            }
          }

      - name: Build and validate Apps wheel boundary
        run: |
          conda run --no-capture-output -n solarphysics_env_latest `
            python -m build --wheel --outdir Apps\dist Apps
          @'
          from pathlib import Path
          from zipfile import ZipFile

          wheels = sorted(Path("Apps/dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected one Apps wheel, found {wheels}")

          blocked_parts = {
              "Local",
              "Local-migration-backup",
              "scripts",
              "legacy",
              "legacy_tests",
              "history",
              "outputs",
              "logs",
          }
          blocked_suffixes = {
              ".avi", ".csv", ".db", ".fit", ".fits", ".gif", ".h5",
              ".hdf5", ".jpg", ".json", ".jsonl", ".mkv", ".mov", ".mp4",
              ".nc", ".npy", ".npz", ".parquet", ".pdf", ".pkl", ".png",
              ".sqlite", ".tsv", ".webp", ".xls", ".xlsx",
          }
          required_suffixes = (
              ".html",
              ".css",
              ".js",
              "mediabunny-1.50.8.cjs",
              "mediabunny-MPL-2.0.txt",
              "NOTICE.txt",
          )

          with ZipFile(wheels[0]) as archive:
              names = archive.namelist()
          forbidden = [
              name
              for name in names
              if blocked_parts.intersection(Path(name).parts)
              or Path(name).suffix.casefold() in blocked_suffixes
          ]
          if forbidden:
              raise SystemExit(f"private or legacy content in Apps wheel: {forbidden}")
          missing = [
              suffix
              for suffix in required_suffixes
              if not any(name.endswith(suffix) for name in names)
          ]
          if missing:
              raise SystemExit(f"required frontend assets missing from wheel: {missing}")
          print(f"Apps wheel boundary ok: {wheels[0]}")
          '@ | conda run --no-capture-output -n solarphysics_env_latest python -

  apps-macos-miniforge:
    name: Apps (macOS arm64 Miniforge)
    runs-on: macos-15
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      QT_QPA_PLATFORM: "offscreen"
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Create Miniforge application environment
        uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v4.0.1
        with:
          activate-environment: solarphysics_env_latest
          environment-file: Apps/environment.miniforge.yml
          python-version: "3.14"
          miniforge-version: latest
          channels: conda-forge
          channel-priority: strict
          conda-remove-defaults: "true"
          auto-update-conda: false

      - name: Install public library and applications
        run: |
          conda run --no-capture-output -n solarphysics_env_latest \
            python -m pip install --upgrade pip
          conda run --no-capture-output -n solarphysics_env_latest \
            python -m pip install -e "./Python[quality-ml]"
          conda run --no-capture-output -n solarphysics_env_latest \
            python -m pip install -e "./Apps[dev]"
          conda run --no-capture-output -n solarphysics_env_latest \
            python -m pip check

      - name: Initialize private CI runtime
        run: |
          chmod +x Apps/run.sh
          export SOLAR_MINIFORGE_ROOT="$CONDA"
          conda run --no-capture-output -n solarphysics_env_latest \
            ./Apps/run.sh admin init

      - name: Compile, lint, format-check, and test Apps
        run: |
          conda run --no-capture-output -n solarphysics_env_latest \
            python -m compileall -q Apps/solar_apps Apps/tests
          conda run --no-capture-output -n solarphysics_env_latest \
            python -m ruff check Apps/solar_apps Apps/tests
          conda run --no-capture-output -n solarphysics_env_latest \
            python -m black --check Apps/solar_apps Apps/tests
          conda run --no-capture-output -n solarphysics_env_latest \
            python -m pytest Apps/tests --basetemp Local/tmp/pytest-apps-macos-ci

      - name: Smoke all canonical frontend help
        run: |
          export SOLAR_MINIFORGE_ROOT="$CONDA"
          for frontend in \
            workbench image-viewer image-composer bad-frame-review source-map \
            dart-spectrogram roi-lightcurve radio-composite source-trajectory
          do
            conda run --no-capture-output -n solarphysics_env_latest \
              ./Apps/run.sh frontend "$frontend" --help
          done

      - name: Build Apps wheel
        run: |
          conda run --no-capture-output -n solarphysics_env_latest \
            python -m build --wheel --outdir Apps/dist Apps

  literature-catalog:
    name: Literature catalog
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate catalog is current
        run: .\tools\literature\update_catalog.ps1 -Check

      - name: Validate catalog records and repository boundary
        run: |
          $parsedCatalog = Get-Content -Raw .\Paper\catalog\papers.json | ConvertFrom-Json
          $catalog = @($parsedCatalog)
          if ($catalog.Count -eq 0) { throw "Literature catalog is empty" }

          foreach ($field in @("title", "doi", "arxiv_id")) {
              $values = @($catalog | ForEach-Object {
                  ([string]$_.$field).Trim().ToLowerInvariant()
              } | Where-Object { $_ })
              if ($field -eq "title" -and $values.Count -ne $catalog.Count) {
                  throw "A catalog record has no title"
              }
              if (@($values | Sort-Object -Unique).Count -ne $values.Count) {
                  throw "Literature catalog contains duplicate $field values"
              }
          }

          $trackedDocuments = @(git ls-files -- Paper | Where-Object {
              $_ -match '(?i)\.(pdf|doc|docx)$'
          })
          if ($trackedDocuments.Count -ne 0) {
              throw "Paper contains tracked PDF/DOC/DOCX files: $($trackedDocuments -join ', ')"
          }

          Write-Host "Literature catalog validation passed: records=$($catalog.Count)"

      - name: Install pinned Pester
        run: |
          $version = "4.10.1"
          $packagePath = Join-Path $env:RUNNER_TEMP "Pester.$version.nupkg"
          $archivePath = Join-Path $env:RUNNER_TEMP "Pester.$version.zip"
          $modulePath = Join-Path $env:RUNNER_TEMP "Pester-$version"
          $expectedHash = "898210e1a30c52cd46ba317c2278a9324345214213aa2f7d6b7dfa7b98f37ac9"

          Invoke-WebRequest -UseBasicParsing `
            -Uri "https://www.powershellgallery.com/api/v2/package/Pester/$version" `
            -OutFile $packagePath
          $actualHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $packagePath).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
              throw "Pester package checksum mismatch: $actualHash"
          }

          Copy-Item -LiteralPath $packagePath -Destination $archivePath
          Expand-Archive -LiteralPath $archivePath -DestinationPath $modulePath
          Get-ChildItem -LiteralPath $modulePath -File -Recurse | Unblock-File
          $manifestPath = Join-Path $modulePath "Pester.psd1"
          if (-not (Test-Path -LiteralPath $manifestPath)) {
              throw "Pester manifest not found: $manifestPath"
          }
          "PESTER_MODULE_PATH=$manifestPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run Literature catalog Pester tests
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "Import-Module '$env:PESTER_MODULE_PATH' -Force; Invoke-Pester -Script .\tools\literature\tests\LiteratureCatalog.Tests.ps1 -EnableExit"
