name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-history-scan:
    name: Scan complete Git history
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out complete repository history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false

  lightweight-checks:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install FFmpeg media tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ffmpeg
          ffmpeg -version | sed -n '1p'
          ffprobe -version | sed -n '1p'

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate YAML configuration examples
        run: python -c "import yaml; yaml.safe_load(open('configs/paths.example.yaml', encoding='utf-8')); print('yaml ok')"

      - name: Compile Python files
        run: python -m compileall -q .

      - name: Run lightweight tests
        run: python -m pytest -q tests

      - name: Check package imports
        run: python -c "from solar_toolkit import solar_analysis_utils; import solar_toolkit; print(solar_toolkit.__version__)"
