# Copy this file to configs/paths.local.yaml and edit paths for your machine.
# You can also set SOLAR_PHYSICS_CONFIG to point at another YAML file.
# Sections under scripts: map to runnable workflows in scripts/ and examples/.
# Missing sections leave each script's built-in defaults unchanged.

scripts:
  sdo_aia_euv_processor:
    data_path: data/aia
    output_dir: outputs/aia

  sdo_aia_base_difference:
    data_dir: data/aia/131
    output_dir: outputs/aia/base_difference/131
    show_plot: false

  sdo_aia_running_difference:
    data_dir: data/aia/94
    output_dir: outputs/aia/running_difference/94
    show_plot: false

  sdo_aia_lightcurve_extraction:
    data_dir: data/aia/1600
    output_dir: outputs/aia/flux
    data_filename: aia_1600_the selected region.csv

  sdo_aia_lightcurve_plot:
    input_dir: data/aia/flux
    output_dir: outputs/aia/flux

  sdo_aia_time_file_selector:
    source_dir: data/aia
    output_base_dir: outputs/dem
    target_time: "2025-01-24T045710"
    tolerance: 12

  sdo_aia_hmi_overlay:
    input_dir_AIA: data/aia/171
    input_dir_HMI: data/hmi
    output_dir: outputs/aia_hmi
    show_plot: false

  sdo_aia_asos_hxi_overlay:
    input_dir_AIA: data/aia/304
    output_dir: outputs/aia_hxi/304
    hxi_file_path: data/hxi/10-20.fits
    hxi_file_path_pro: data/hxi/20-30.fits

  sdo_aia_radio_hmi_overlay:
    radio_base_dir: data/radio
    aia_base_dir: data/aia/171
    hmi_base_dir: data/hmi
    output_dir: outputs/aia_radio_hmi

  cso_radio_spectrogram_plot:
    file_path: data/radio/spectrogram.fits
    save_path: outputs/radio/spectrogram

  cso_spectrogram_class:
    file_path: data/radio/spectrogram.fits

  radio_source_map_plot:
    single_file_path: data/radio/149MHz/RR/example.fits
    data_dir: data/radio/149MHz/RR
    multi_band_root: data/radio
    output_dir: outputs/radio/source_maps

  # These two event modules accept only the path leaves shown below. Scientific
  # parameters stay in the packaged Python configuration and cannot be changed
  # through SOLAR_PHYSICS_CONFIG.
  radio_20250124_config:
    user:
      data:
        multi_band_root: data/radio/2025-01-24
        single_file_path: data/radio/2025-01-24/149MHz/RR/example.fits
        data_dir: data/radio/2025-01-24/149MHz/RR
      spectrogram:
        file_path: data/radio/2025-01-24/spectrogram.fits
    output:
      output_dir: outputs/radio/2025-01-24
    aia_radio_hmi:
      paths:
        radio_base_dir: data/radio/2025-01-24
        aia_base_dir: data/aia/2025-01-24/171
        hmi_base_dir: data/hmi/2025-01-24
        output_dir: outputs/radio/2025-01-24/AIA_Gaussian_Overlay
      output:
        output_dir: outputs/radio/2025-01-24/AIA_Gaussian_Overlay
    aia_multi_wave_gaussian_spectrogram:
      paths:
        aia_panel_base_dir_template: data/aia/2025-01-24/{wave}
        output_dir: outputs/radio/2025-01-24/AIA_6band_GaussianRadio_Spectrogram
      output:
        output_dir: outputs/radio/2025-01-24/AIA_6band_GaussianRadio_Spectrogram

  radio_20250503_config:
    user:
      data:
        multi_band_root: data/radio/2025-05-03
        single_file_path: data/radio/2025-05-03/149MHz/RR/example.fits
        data_dir: data/radio/2025-05-03/149MHz/RR
      spectrogram:
        file_paths:
          - data/radio/2025-05-03/spectrogram-1.fits
          - data/radio/2025-05-03/spectrogram-2.fits
        file_path: data/radio/2025-05-03/spectrogram-1.fits
    output:
      output_dir: outputs/radio/2025-05-03
    aia_radio_hmi:
      paths:
        radio_base_dir: data/radio/2025-05-03
        aia_base_dir: data/aia/2025-05-03/171
        hmi_base_dir: data/hmi/2025-05-03
        output_dir: outputs/radio/2025-05-03/AIA_Raw_Radio_Overlay
      output:
        output_dir: outputs/radio/2025-05-03/AIA_Raw_Radio_Overlay
    aia_raw_radio_spectrogram:
      paths:
        output_dir: outputs/radio/2025-05-03/AIA_Raw_Radio_Spectrogram
      output:
        output_dir: outputs/radio/2025-05-03/AIA_Raw_Radio_Spectrogram
    aia_multi_wave_raw_radio_spectrogram:
      paths:
        aia_panel_base_dir_template: data/aia/2025-05-03/{wave}
        output_dir: outputs/radio/2025-05-03
      output:
        output_dir: outputs/radio/2025-05-03

  sdo_aia_dem_inversion:
    aia_fits_path: data/aia/example.fits
    tb_data_path: data/radio/Tb_149MHz.npy

  dem_radio_source_overlay:
    aia_fits_path: data/aia/example.fits
    tb_data_path: data/radio/Tb_223MHz.npy
    radio_sources_dir: data/radio/223MHz/RR

  flare_aia_sxr_hxr_summary_plot:
    sxr: data/xray/goes-sxr.nc
    hxi: data/xray/hxi.fits
    aia_dir: data/aia/flux

  goes_sxr_lightcurve_plot:
    file_path: data/xray/goes-sxr.nc

  neupert_sxr_derivative_hxr_comparison:
    data_file_path: data/xray/goes-sxr.nc

  neupert_timing_error_analysis:
    file_path: data/xray/goes-sxr.nc

  sdo_hmi_magnetogram_plot:
    data_dir: data/hmi
    output_dir: outputs/hmi
    show_plot: false

  asos_hxi_image_plot:
    file_path: data/hxi/image_cube.fits

  asos_hxi_goes_sxr_comparison:
    file_path: data/hxi/lightcurve.fits

  soho_lasco_data_download:
    save_dir: data/lasco

  soho_lasco_image_plot:
    input_dir: data/lasco
    output_dir: outputs/lasco/plots
    show_plot: false

  soho_lasco_running_difference:
    input_dir: data/lasco
    output_dir: outputs/lasco/difference
    show_plot: false

  image_sequence_to_video:
    input_dir: data/images
    output_dir: outputs/video
    video_name: RR+LL.mp4

  dev_aia_radio_hmi_overlay:
    radio_base_dir: data/radio
    aia_base_dir: data/aia/171
    hmi_base_dir: data/hmi
    output_dir: outputs/aia_radio_hmi

  test_aia_radio_hmi_overlay_extended:
    radio_base_dir: data/radio
    aia_base_dir: data/aia/171
    hmi_base_dir: data/hmi
    output_dir: outputs/aia_radio_hmi

  test_cso_spectrogram_processing:
    file_path: data/radio/spectrogram.fits

  test_fits_header_metadata:
    file_path0: data/radio/149MHz/declination.fits
    file_path1: data/radio/149MHz/right_ascension.fits
